<div class="page-header">

  <h1>Journal d'activité</h1>

  <p>Historique automatique des opérations ({{ total() }} entrées)</p>

</div>



@if (loading()) {

  <mat-spinner />

} @else {

  <div class="table-responsive">

    <table mat-table [dataSource]="entries()" class="data-table responsive-table">

      <ng-container matColumnDef="created_at">

        <th mat-header-cell *matHeaderCellDef>Date</th>

        <td mat-cell *matCellDef="let e" data-label="Date">{{ e.created_at | date:'dd/MM/yyyy HH:mm:ss' }}</td>

      </ng-container>

      <ng-container matColumnDef="user">

        <th mat-header-cell *matHeaderCellDef>Utilisateur</th>

        <td mat-cell *matCellDef="let e" data-label="Utilisateur">{{ e.user?.full_name || '—' }}</td>

      </ng-container>

      <ng-container matColumnDef="action">

        <th mat-header-cell *matHeaderCellDef>Action</th>

        <td mat-cell *matCellDef="let e" data-label="Action">

          <mat-icon class="action-icon">{{ actionIcon(e.action) }}</mat-icon>

          {{ e.action }}

        </td>

      </ng-container>

      <ng-container matColumnDef="description">

        <th mat-header-cell *matHeaderCellDef>Description</th>

        <td mat-cell *matCellDef="let e" data-label="Description">{{ e.description }}</td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>

      <tr mat-row *matRowDef="let row; columns: columns"></tr>

    </table>

  </div>

}
