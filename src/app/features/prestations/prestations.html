<div class="page-header">
  <div class="page-header-top">
    <h1>Prestations (Services)</h1>
    <div class="page-header-actions">
      <button mat-raised-button color="primary" (click)="showForm.set(!showForm())">
        <mat-icon>add</mat-icon>
        <span class="btn-label">Nouvelle prestation</span>
      </button>
    </div>
  </div>
  <p>Services non quantifiables (FC et USD)</p>
</div>

@if (showForm()) {
  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Code</mat-label>
          <input matInput formControlName="code" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Nom</mat-label>
          <input matInput formControlName="nom" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Prix</mat-label>
          <input matInput type="number" formControlName="prix" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Devise</mat-label>
          <mat-select formControlName="devise">
            @for (d of devises; track d) {
              <mat-option [value]="d">{{ d === 'FC' ? 'Franc congolais (FC)' : 'Dollar (USD)' }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          <mat-icon>save</mat-icon> Enregistrer
        </button>
      </form>
    </mat-card-content>
  </mat-card>
}

<div class="table-responsive">
  <table mat-table [dataSource]="prestations()" class="data-table responsive-table">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let p" data-label="Code">{{ p.code }}</td>
    </ng-container>
    <ng-container matColumnDef="nom">
      <th mat-header-cell *matHeaderCellDef>Nom</th>
      <td mat-cell *matCellDef="let p" data-label="Nom">{{ p.nom }}</td>
    </ng-container>
    <ng-container matColumnDef="prix">
      <th mat-header-cell *matHeaderCellDef>Prix</th>
      <td mat-cell *matCellDef="let p" data-label="Prix">{{ p.prix | number:'1.0-0' }}</td>
    </ng-container>
    <ng-container matColumnDef="devise">
      <th mat-header-cell *matHeaderCellDef>Devise</th>
      <td mat-cell *matCellDef="let p" data-label="Devise">
        <span class="devise-badge" [class.usd]="p.devise === 'USD'">{{ p.devise || 'FC' }}</span>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
</div>
