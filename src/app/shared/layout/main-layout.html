<mat-sidenav-container class="layout-container">
  <mat-sidenav
    #drawer
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="drawerOpened()"
    (openedChange)="drawerOpened.set($event)"
    class="sidenav"
  >
    <div class="sidenav-header">
      <img src="/images/logo-icon.png" alt="Optimo 360" class="logo" />
      <div class="brand-text">
        <span class="brand">Optimo 360</span>
        <small>Gestion de caisse</small>
      </div>
    </div>

    <nav class="sidenav-nav">
      <mat-nav-list>
        @for (item of navItems(); track item.route) {
          <a
            mat-list-item
            [routerLink]="item.route"
            routerLinkActive="active-link"
            class="nav-item"
            (click)="closeSidenavIfMobile()"
          >
            <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
          </a>
        }
      </mat-nav-list>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <header class="topbar">
      <button mat-icon-button class="menu-btn" (click)="toggleSidenav()" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="topbar-brand">
        <img src="/images/logo.png" alt="Optimo 360" class="topbar-logo" />
        <div class="topbar-title">
          <span class="page-sub">Gestion des produits, prestations et services</span>
        </div>
      </div>
      <span class="spacer"></span>

      <button mat-button class="account-trigger" [matMenuTriggerFor]="accountMenu">
        <div class="account-avatar">
          <mat-icon>person</mat-icon>
        </div>
        <div class="account-summary">
          <span class="account-name">{{ user()?.full_name }}</span>
          <span class="account-role">{{ roleLabel(user()?.role) }}</span>
        </div>
        <mat-icon class="chevron">expand_more</mat-icon>
      </button>

      <mat-menu #accountMenu="matMenu" class="account-menu" xPosition="before">
        <div class="menu-profile" (click)="$event.stopPropagation()">
          <div class="menu-avatar">
            <mat-icon>person</mat-icon>
          </div>
          <div class="menu-info">
            <strong>{{ user()?.full_name }}</strong>
            <span>{{ user()?.email }}</span>
            <small>{{ roleLabel(user()?.role) }}</small>
          </div>
        </div>
        <mat-divider />
        <button mat-menu-item routerLink="/profil">
          <mat-icon>account_circle</mat-icon>
          <span>Mon profil</span>
        </button>
        @if (auth.hasRole('super_admin', 'admin', 'manager')) {
          <button mat-menu-item routerLink="/parametres">
            <mat-icon>settings</mat-icon>
            <span>Paramètres</span>
          </button>
        }
        <mat-divider />
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Déconnexion</span>
        </button>
      </mat-menu>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
